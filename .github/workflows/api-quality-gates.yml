name: API Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run L1 Smoke Tests
        run: pytest -q tests/l1_smoke
      - name: Run L2 Contract Tests
        run: pytest -q tests/l2_contract
      - name: Run L3 Workflow Tests
        run: pytest -q tests/l3_workflow
      - name: Run L4 Reconciliation Tests
        run: pytest -q tests/l4_reconciliation
      - name: Run L5 Governance Tests
        run: pytest -q tests/l5_governance
